<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gye Nyame - Audio Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo h1 {
            color: #e94560;
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .logo p {
            color: #666;
            font-size: 14px;
        }
        
        .player {
            background: #f5f5f5;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .track-info {
            text-align: center;
            margin-bottom: 15px;
        }
        
        .track-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .track-language {
            font-size: 12px;
            color: #666;
            background: #e94560;
            color: white;
            padding: 3px 10px;
            border-radius: 10px;
            display: inline-block;
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #ddd;
            border-radius: 3px;
            margin-bottom: 15px;
            cursor: pointer;
            position: relative;
        }
        
        .progress-fill {
            height: 100%;
            background: #e94560;
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }
        
        .btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        
        .btn:hover {
            background: #d63447;
            transform: scale(1.05);
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn-play {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 24px;
        }
        
        .playlist {
            list-style: none;
        }
        
        .playlist li {
            padding: 12px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .playlist li:hover {
            background: #f5f5f5;
        }
        
        .playlist li.active {
            background: #ffe5e5;
            border-left: 3px solid #e94560;
        }
        
        .playlist-title {
            font-weight: 500;
        }
        
        .playlist-duration {
            color: #999;
            font-size: 12px;
        }
        
        .message {
            text-align: center;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 10px;
            color: #2e7d32;
            margin-bottom: 15px;
        }
        
        .error {
            background: #ffebee;
            color: #c62828;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🛡️ Gye Nyame</h1>
            <p>Digital Protection Audio</p>
        </div>
        
        <div id="message" class="message">
            Select a track to play
        </div>
        
        <div class="player">
            <div class="track-info">
                <div class="track-title" id="trackTitle">Welcome</div>
                <span class="track-language" id="trackLanguage">Twi</span>
            </div>
            
            <div class="progress-bar" onclick="seek(event)">
                <div class="progress-fill" id="progress"></div>
            </div>
            
            <div class="controls">
                <button class="btn btn-play" onclick="togglePlay()" id="playBtn">▶</button>
            </div>
        </div>
        
        <h3 style="margin-bottom: 10px; color: #333;">📖 Lessons</h3>
        <ul class="playlist" id="playlist">
            <li onclick="playTrack(0)" class="active">
                <span class="playlist-title">Welcome / Akwaaba</span>
                <span class="playlist-duration">0:15</span>
            </li>
            <li onclick="playTrack(1)">
                <span class="playlist-title">Gye Nyame Story</span>
                <span class="playlist-duration">0:30</span>
            </li>
            <li onclick="playTrack(2)">
                <span class="playlist-title">Digital Safety Tips</span>
                <span class="playlist-duration">0:25</span>
            </li>
            <li onclick="playTrack(3)">
                <span class="playlist-title">Quiz Correct Answer</span>
                <span class="playlist-duration">0:08</span>
            </li>
            <li onclick="playTrack(4)">
                <span class="playlist-title">Quiz Wrong Answer</span>
                <span class="playlist-duration">0:08</span>
            </li>
            <li onclick="playTrack(5)">
                <span class="playlist-title">Congratulations</span>
                <span class="playlist-duration">0:12</span>
            </li>
        </ul>
    </div>

    <script>
        // Audio tracks - using Web Speech API for free TTS
        const tracks = [
            { title: 'Welcome / Akwaaba', lang: 'ak-GH', text: 'Akwaaba! Meda woaseɛ! Woakyɛ! Welcome to Gye Nyame Digital Protection Module!' },
            { title: 'Gye Nyame Story', lang: 'ak-GH', text: 'Gye Nyame yɛ Akan symbol bi a ɛkyerɛ "Gyen Nyame" - Onyankopɔn nko na Ɛma ahyeƐ. Gye Nyame is an Adinkra symbol meaning except God, representing supreme protection.' },
            { title: 'Digital Safety Tips', lang: 'ak-GH', text: 'AhyeƐ a ɛwɔ intanƐ no ho: Ma Wo password yɛ pẽ. Mma mpɛson nnsa Wo PIN. IntanƐ no mu, bo wo ho koraa!' },
            { title: 'Quiz Correct Answer', lang: 'ak-GH', text: 'Daabi! Woayɛ no yie! Correct! You protected yourself!' },
            { title: 'Quiz Wrong Answer', lang: 'ak-GH', text: 'Mber! Ehia sɛ woganyan! Wrong! Be careful next time!' },
            { title: 'Congratulations', lang: 'ak-GH', text: 'Akwaaba woakyɛ! Woadwene sɛ woaprom! Asante! Congratulations! You completed the module!' }
        ];

        let currentTrack = 0;
        let isPlaying = false;
        let utterance = null;

        function playTrack(index) {
            currentTrack = index;
            const track = tracks[index];
            
            document.getElementById('trackTitle').textContent = track.title;
            document.getElementById('trackLanguage').textContent = track.lang === 'ak-GH' ? 'Twi' : 'English';
            
            // Update playlist active state
            document.querySelectorAll('.playlist li').forEach((li, i) => {
                li.classList.toggle('active', i === index);
            });
            
            // Stop any current speech
            speechSynthesis.cancel();
            
            // Create new utterance
            utterance = new SpeechSynthesisUtterance(track.text);
            utterance.lang = track.lang;
            utterance.rate = 0.85;
            utterance.pitch = 0;
            
            utterance.onstart = () => {
                isPlaying = true;
                document.getElementById('playBtn').textContent = '⏸';
                document.getElementById('message').textContent = '🔊 Playing...';
                document.getElementById('message').className = 'message';
            };
            
            utterance.onend = () => {
                isPlaying = false;
                document.getElementById('playBtn').textContent = '▶';
                document.getElementById('message').textContent = '✅ Finished playing!';
                document.getElementById('progress').style.width = '100%';
            };
            
            utterance.onerror = (e) => {
                isPlaying = false;
                document.getElementById('playBtn').textContent = '▶';
                document.getElementById('message').textContent = '❌ Error playing audio';
                document.getElementById('message').className = 'message error';
            };
            
            speechSynthesis.speak(utterance);
        }

        function togglePlay() {
            if (isPlaying) {
                speechSynthesis.pause();
                isPlaying = false;
                document.getElementById('playBtn').textContent = '▶';
                document.getElementById('message').textContent = '⏸ Paused';
            } else if (speechSynthesis.paused) {
                speechSynthesis.resume();
                isPlaying = true;
                document.getElementById('playBtn').textContent = '⏸';
                document.getElementById('message').textContent = '🔊 Playing...';
            } else {
                playTrack(currentTrack);
            }
        }

        function seek(event) {
            // Not applicable for speech synthesis
        }

        // Try to load voices
        let voices = [];
        speechSynthesis.onvoiceschanged = () => {
            voices = speechSynthesis.getVoices();
            console.log('Voices loaded:', voices.length);
        };
    </script>
</body>
</html>
